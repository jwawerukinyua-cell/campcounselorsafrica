<style>
  :root{
    --cream:#E8DFC8;
    --cream-dim:#DDD2B8;
    --ink:#211D14;
    --acacia:#62B52A;
    --acacia-deep:#356317;
    --rust:#B9622C;
    --rust-deep:#9A4E22;
    --gold:#C89B3C;
    --night:#1B2430;
    --night-2:#242F3F;
    --paper-line: rgba(33,29,20,0.14);
    --shadow: 0 10px 30px rgba(33,29,20,0.12);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    max-width:100%;
  }
  img, svg{max-width:100%;height:auto;}
  h1,h2,h3,h4{
    font-family:'Fraunces',serif;
    margin:0;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 28px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    text-transform:uppercase;
    font-size:0.72rem;
    letter-spacing:0.14em;
    color:var(--rust-deep);
    display:flex;align-items:center;gap:10px;
  }
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--rust-deep);display:inline-block;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:0.92rem;
    padding:13px 26px;border-radius:2px;border:1.5px solid var(--ink);
    background:var(--ink);color:var(--cream);
    cursor:pointer;text-decoration:none;transition:transform .18s ease, background .18s ease;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn.ghost{background:transparent;color:var(--ink);}
  .btn.rust{background:var(--rust);border-color:var(--rust);color:#fff;}
  .btn.rust:hover{background:var(--rust-deep);}
  .btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;}

  /* ===== HEADER ===== */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(27,36,48,0.96);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(232,223,200,0.1);
  }
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;max-width:1180px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:600;font-size:1.28rem;color:var(--acacia);}
  .brand .mark{
    width:32px;height:32px;border-radius:50%;
    background:var(--acacia);color:var(--gold);
    display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;
    font-family:'IBM Plex Mono',monospace;
  }
  .brand-logo{height:34px;width:auto;object-fit:contain;}
  .navlinks{display:flex;gap:28px;font-size:0.9rem;font-weight:500;}
  .navlinks a{text-decoration:none;color:var(--cream);opacity:0.82;transition:opacity .15s;}
  .navlinks a:hover{opacity:1;}
  @media(max-width:860px){.navlinks{display:none;}}

  /* ===== MOBILE MENU ===== */
  .hamburger{
    display:none;flex-direction:column;justify-content:center;gap:5px;
    width:38px;height:38px;background:none;border:none;cursor:pointer;padding:0;
  }
  .hamburger span{display:block;width:24px;height:2px;background:var(--cream);border-radius:2px;transition:transform .2s ease, opacity .2s ease;}
  @media(max-width:860px){.hamburger{display:flex;}}
  .mobile-menu{
    display:none;flex-direction:column;
    background:var(--night);border-bottom:1px solid rgba(232,223,200,0.12);
    padding:8px 28px 20px;
  }
  .mobile-menu.open{display:flex;}
  .mobile-menu a{
    color:var(--cream);text-decoration:none;padding:13px 0;font-size:1rem;
    border-bottom:1px solid rgba(232,223,200,0.08);
  }
  .mobile-menu a:last-child{border-bottom:none;}
  .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

  /* ===== HERO ===== */
  .hero{position:relative;overflow:hidden;padding:90px 0 70px;}
  .hero-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:50px;align-items:center;}
  @media(max-width:900px){.hero-grid{grid-template-columns:1fr;}}
  .hero h1{font-size:clamp(2.4rem,5vw,3.9rem);line-height:1.03;margin:18px 0 22px;}
  .hero h1 em{font-style:normal;color:var(--rust);}
  .hero p.lead{font-size:1.1rem;max-width:46ch;opacity:0.85;margin-bottom:30px;}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:34px;}
  .stat-strip{display:flex;gap:28px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;}
  .stat-strip .num{font-size:1.5rem;font-weight:600;color:var(--acacia-deep);}
  .stat-strip .lbl{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;opacity:0.65;}

  .route-panel{
    position:relative;background:var(--acacia-deep);border-radius:4px;
    padding:34px;color:var(--cream);min-height:420px;
    box-shadow:var(--shadow);
  }
  .route-panel .tag{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);opacity:0.9;}
  .route-svg{width:100%;height:320px;margin-top:10px;}
  .route-svg .dot{fill:var(--gold);}
  .route-svg .node-label{font-family:'IBM Plex Mono',monospace;font-size:11px;fill:var(--cream);}
  .route-svg .path{
    fill:none;stroke:var(--gold);stroke-width:1.6;stroke-dasharray:5 6;
    stroke-linecap:round;
    stroke-dashoffset:1000;
    animation:draw 3.5s ease forwards;
  }
  @keyframes draw{to{stroke-dashoffset:0;}}
  @media (prefers-reduced-motion: reduce){ .route-svg .path{animation:none;stroke-dashoffset:0;} }

  /* ===== SECTION SHELLS ===== */
  section{padding:84px 0;}
  .section-head{max-width:640px;margin-bottom:48px;}
  .section-head h2{font-size:clamp(1.7rem,3vw,2.4rem);margin-top:14px;}
  .divider{border:none;border-top:1px solid var(--paper-line);margin:0;}

  /* ===== PATHWAYS ===== */
  .pathway-list{display:flex;flex-direction:column;gap:1px;background:var(--paper-line);border:1px solid var(--paper-line);}
  .pathway{background:var(--cream);padding:36px;display:grid;grid-template-columns:1.3fr 1fr;gap:30px;min-width:0;}
  @media(max-width:800px){.pathway{grid-template-columns:1fr;}}
  .pathway h3{font-size:1.5rem;margin-bottom:8px;}
  .pathway .sub{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--rust-deep);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}
  .pathway p{opacity:0.85;max-width:56ch;}
  .meta-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-content:start;}
  @media(max-width:500px){.meta-row{grid-template-columns:1fr;}}
  .meta-item .k{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;opacity:0.55;margin-bottom:4px;}
  .meta-item .v{font-weight:600;font-size:0.95rem;}

  /* ===== ABOUT / VALUES ===== */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
  @media(max-width:860px){.about-grid{grid-template-columns:1fr;}}
  .values-grid{display:flex;flex-wrap:wrap;gap:1px;background:var(--paper-line);border:1px solid var(--paper-line);margin-top:40px;}
  .value-card{flex:1 1 20%;}
  @media(max-width:900px){.value-card{flex:1 1 100%;}}
  .value-card{background:var(--cream);padding:24px 18px;min-width:0;}
  .value-card .n{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--rust);margin-bottom:10px;}
  .value-card h4{font-size:1rem;margin-bottom:6px;}
  .value-card p{font-size:0.85rem;opacity:0.75;margin:0;}

  /* services */
  .service-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--paper-line);border:1px solid var(--paper-line);}
  @media(max-width:900px){.service-grid{grid-template-columns:1fr;}}
  .service-card{background:var(--cream);padding:28px 22px;min-height:180px;display:flex;flex-direction:column;justify-content:flex-end;min-width:0;}
  .service-card .tag2{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;text-transform:uppercase;color:var(--rust-deep);margin-bottom:10px;}
  .service-card h4{font-size:1.05rem;margin-bottom:6px;}
  .service-card p{font-size:0.85rem;opacity:0.75;margin:0;}
  .service-card.security{background:var(--acacia-deep);color:var(--cream);}
  .service-card.security .tag2{color:var(--gold);}
  .service-card.security p{opacity:0.85;}

  /* ===== TIMELINE ===== */
  .timeline{position:relative;padding-left:2px;}
  .timeline-line{position:absolute;left:78px;top:6px;bottom:6px;width:1px;background:var(--paper-line);}
  @media(max-width:700px){.timeline-line{left:52px;}}
  .t-item{display:grid;grid-template-columns:78px 1fr;gap:24px;padding:26px 0;position:relative;}
  @media(max-width:700px){.t-item{grid-template-columns:52px 1fr;}}
  .t-item + .t-item{border-top:1px solid var(--paper-line);}
  .t-year{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--rust);font-size:1rem;position:relative;}
  .t-year::after{content:"";position:absolute;right:-29px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--cream);}
  @media(max-width:700px){.t-year::after{right:-27px;}}
  .t-content h4{font-size:1.15rem;margin-bottom:6px;}
  .t-content .place{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;opacity:0.6;margin-bottom:8px;}
  .t-content p{opacity:0.8;font-size:0.92rem;max-width:62ch;}
  .t-photos{display:flex;gap:14px;margin-top:16px;flex-wrap:wrap;}
  .t-photos figure{margin:0;width:200px;}
  .t-photos img{width:100%;height:140px;object-fit:cover;border-radius:2px;box-shadow:var(--shadow);filter:sepia(0.12) contrast(1.03);}
  .t-photos figcaption{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;opacity:0.55;margin-top:7px;text-transform:uppercase;letter-spacing:0.04em;}
  @media(max-width:520px){.t-photos figure{width:100%;}}

  /* ===== FIELD ARCHIVE GALLERY ===== */
  .archive-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--paper-line);border:1px solid var(--paper-line);}
  @media(max-width:900px){.archive-grid{grid-template-columns:1fr;}}
  .archive-card{background:#fff;overflow:hidden;min-width:0;}
  .archive-card img{width:100%;height:220px;object-fit:cover;display:block;filter:sepia(0.12) contrast(1.03);transition:transform .3s ease;}
  .archive-card:hover img{transform:scale(1.04);}
  .archive-cap{padding:16px 18px;}
  .archive-cap .k{font-family:'IBM Plex Mono',monospace;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--rust-deep);margin-bottom:4px;}
  .archive-cap p{font-size:0.85rem;opacity:0.75;margin:0;}

  /* ===== FAQ ===== */
  .faq-list{border-top:1px solid var(--paper-line);}
  .faq-item{border-bottom:1px solid var(--paper-line);padding:20px 0;}
  .faq-item summary{
    cursor:pointer;font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;
    list-style:none;display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .faq-item summary::-webkit-details-marker{display:none;}
  .faq-item summary::after{
    content:"+";font-family:'IBM Plex Mono',monospace;font-size:1.3rem;color:var(--rust);
    flex-shrink:0;transition:transform .2s ease;
  }
  .faq-item[open] summary::after{content:"–";}
  .faq-item p{margin:14px 0 0;opacity:.78;font-size:.94rem;max-width:70ch;line-height:1.6;}

  /* ===== CALL FLOAT ===== */
  .call-float{
    position:fixed;bottom:24px;right:24px;z-index:60;
    background:var(--rust);color:#fff;width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,0.25);
    text-decoration:none;
  }
  .call-float::before, .call-float::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    border:2px solid var(--rust);
    animation:callPulse 2.2s cubic-bezier(0.2,0.7,0.4,1) infinite;
    pointer-events:none;
  }
  .call-float::after{animation-delay:1.1s;}
  @keyframes callPulse{
    0%{transform:scale(1);opacity:0.6;}
    100%{transform:scale(2.1);opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){ .call-float::before, .call-float::after{animation:none;} }
  .call-float svg{width:26px;height:26px;fill:#fff;position:relative;z-index:1;}
  .call-float:hover{transform:scale(1.06);}

  /* ===== CALCULATOR (Ledger card) ===== */
  .ledger{
    background:#fff;border:1px solid var(--paper-line);border-radius:4px;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .ledger-top{background:var(--night);color:var(--cream);padding:26px 30px;}
  .ledger-top .tag{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);}
  .ledger-top h3{font-size:1.4rem;margin-top:8px;color:#fff;}
  .ledger-body{padding:30px;display:grid;grid-template-columns:1fr 1fr;gap:36px;}
  @media(max-width:860px){.ledger-body{grid-template-columns:1fr;}}
  .field-group{margin-bottom:22px;}
  .field-group label{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;opacity:0.6;margin-bottom:8px;}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{
    padding:8px 16px;border:1px solid var(--paper-line);border-radius:20px;
    font-size:0.85rem;cursor:pointer;background:var(--cream);transition:all .15s;
  }
  .pill.active{background:var(--acacia);color:var(--ink);border-color:var(--acacia);font-weight:600;}
  .ledger-line{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px dashed var(--paper-line);}
  .ledger-line .l{font-size:0.88rem;opacity:0.7;}
  .ledger-line .v{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .ledger-line.total .v{font-size:1.5rem;color:var(--rust-deep);}
  .ledger-line.total .l{font-weight:600;opacity:1;}
  .projections{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;}
  @media(max-width:420px){.projections{grid-template-columns:1fr;}}
  .proj-card{background:var(--cream-dim);padding:16px 18px;border-radius:3px;min-width:0;}
  .proj-card .k{font-size:0.72rem;font-family:'IBM Plex Mono',monospace;opacity:0.6;text-transform:uppercase;}
  .proj-card .v{font-family:'IBM Plex Mono',monospace;font-size:1.25rem;font-weight:600;color:var(--acacia-deep);margin:4px 0;}
  .proj-card .d{font-size:0.78rem;opacity:0.65;}

  /* ===== AI MATCHER ===== */
  .ai-shell{background:var(--acacia-deep);color:var(--cream);border-radius:4px;overflow:hidden;box-shadow:var(--shadow);}
  .ai-top{padding:30px 34px;border-bottom:1px solid rgba(232,223,200,0.15);}
  .ai-top .tag{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;}
  .ai-top h3{color:#fff;font-size:1.4rem;margin-top:8px;}
  
  /* UPDATED: Mobile handling track parameters */
  .ai-body{padding:34px;display:grid;grid-template-columns:1fr 1fr;gap:40px;}
  @media(max-width:900px){
    .ai-body{
      grid-template-columns:1fr;
      padding:20px 14px;
    }
    .ai-body > * {
      min-width: 0;
    }
  }
  
  .demo-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
  .demo-btn{
    font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
    background:rgba(232,223,200,0.08);border:1px solid rgba(232,223,200,0.25);
    color:var(--cream);padding:8px 14px;border-radius:20px;cursor:pointer;
  }
  .demo-btn:hover{background:rgba(232,223,200,0.16);}
  .ai-field{margin-bottom:16px;}
  .ai-field label{display:block;font-size:0.78rem;opacity:0.7;margin-bottom:6px;}
  .ai-field input, .ai-field select, .ai-field textarea{
    width:100%;padding:11px 13px;border-radius:2px;border:1px solid rgba(232,223,200,0.3);
    background:rgba(232,223,200,0.06);color:var(--cream);font-family:'Work Sans',sans-serif;font-size:0.92rem;
  }
  .ai-field input::placeholder, .ai-field textarea::placeholder{color:rgba(232,223,200,0.4);}
  .ai-field textarea{resize:vertical;min-height:64px;}
  
  /* UPDATED: Grid row wraps inputs much cleaner on smartphones */
  .ai-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:600px){
    .ai-row2{
      grid-template-columns:1fr;
    }
  }
  
  .ai-mode-toggle{display:flex;gap:8px;margin-bottom:20px;}
  .ai-mode-btn{
    flex:1;padding:10px;text-align:center;font-size:0.85rem;font-weight:600;
    border:1px solid rgba(232,223,200,0.25);border-radius:2px;cursor:pointer;
    background:transparent;color:var(--cream);opacity:0.6;
  }
  .ai-mode-btn.active{opacity:1;background:rgba(232,223,200,0.1);border-color:var(--gold);}
  .ai-output{
    background:rgba(0,0,0,0.18);border-radius:3px;padding:22px;min-height:280px;
    font-size:0.92rem;line-height:1.65;white-space:pre-wrap;
  }
  .ai-output.empty{opacity:0.55;font-style:italic;display:flex;align-items:center;justify-content:center;text-align:center;}
  
  /* UPDATED: Dynamic viewport scale limits */
  .letter-sheet{
    background:var(--cream);color:var(--ink);border-radius:2px;
    padding:32px 34px;font-family:'Fraunces',serif;box-shadow:0 4px 16px rgba(0,0,0,0.2);
  }
  @media(max-width:600px){
    .letter-sheet{
      padding:22px 18px;
      font-size:0.94rem;
    }
  }
  
  .letter-date{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;opacity:0.6;margin-bottom:22px;}
  .letter-body{font-size:0.98rem;line-height:1.85;white-space:normal;}
  .spinner{width:16px;height:16px;border:2px solid rgba(232,223,200,0.3);border-top-color:var(--gold);border-radius:50%;display:inline-block;animation:spin .8s linear infinite;margin-right:8px;vertical-align:-3px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== APPLICATION FORM ===== */
  .apply-shell{background:#fff;border:1px solid var(--paper-line);border-radius:4px;box-shadow:var(--shadow);overflow:hidden;}
  .apply-top{padding:28px 34px;background:var(--rust);color:#fff;}
  .apply-top .tag{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;opacity:0.9;}
  .apply-top h3{color:#fff;margin-top:8px;font-size:1.35rem;}
  .step-track{display:flex;gap:6px;padding:20px 34px 0;}
  .step-track .seg{flex:1;height:3px;background:var(--paper-line);border-radius:2px;}
  .step-track .seg.done{background:var(--rust);}
  .apply-body{padding:34px;}
  .apply-field{margin-bottom:18px;}
  .apply-field label{display:block;font-size:0.82rem;font-weight:600;margin-bottom:7px;}
  .apply-field .hint{font-weight:400;opacity:0.55;font-size:0.78rem;}
  .apply-field input, .apply-field select{
    width:100%;padding:12px 14px;border:1px solid var(--paper-line);border-radius:2px;
    font-family:'Work Sans',sans-serif;font-size:0.95rem;background:var(--cream-dim);
  }
  .apply-actions{display:flex;justify-content:space-between;margin-top:26px;}
  .confirm-box{display:none;text-align:center;padding:30px 10px;}
  .confirm-box .icon{width:52px;height:52px;border-radius:50%;background:var(--acacia-deep);color:var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.4rem;font-family:'IBM Plex Mono',monospace;}

  /* ===== TESTIMONIALS (night section) ===== */
  .night-section{background:var(--night);color:var(--cream);}
  .night-section .eyebrow{color:var(--gold);}
  .night-section .eyebrow::before{background:var(--gold);}
  .testi-grid{display:flex;flex-wrap:wrap;gap:1px;background:rgba(232,223,200,0.12);border:1px solid rgba(232,223,200,0.12);margin-top:44px;}
  .testi-card{flex:1 1 240px;}
  @media(max-width:900px){.testi-card{flex:1 1 100%;}}
  .testi-card{background:var(--night-2);padding:30px 26px;display:flex;flex-direction:column;justify-content:space-between;min-height:260px;min-width:0;}
  .avatar{width:38px;height:38px;border-radius:50%;color:#fff;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:0.8rem;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .testi-card .quote{font-family:'Fraunces',serif;font-size:1rem;font-weight:400;line-height:1.6;opacity:0.92;}
  .testi-card .who{margin-top:20px;padding-top:16px;border-top:1px solid rgba(232,223,200,0.15);}
  .testi-card .who .name{font-weight:600;font-size:0.92rem;}
  .testi-card .who .role{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--gold);margin-top:2px;}

  /* ===== FOOTER ===== */
  footer{background:var(--acacia-deep);color:var(--cream);padding:60px 0 30px;}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:50px;}
  @media(max-width:800px){.foot-grid{grid-template-columns:1fr;}}
  footer h4{color:var(--gold);font-size:0.82rem;text-transform:uppercase;letter-spacing:0.08em;font-family:'IBM Plex Mono',monospace;margin-bottom:16px;}
  footer p, footer a{opacity:0.85;font-size:0.9rem;}
  footer a{text-decoration:none;display:block;margin-bottom:8px;}
  .foot-bottom{border-top:1px solid rgba(232,223,200,0.15);margin-top:44px;padding-top:22px;font-size:0.78rem;opacity:0.55;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
</style>
</head>
